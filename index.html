<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PixelSaurus Claw 777 Mint Machine MML</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07070a;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(680px, 100%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 7vw, 64px);
        line-height: 0.95;
      }

      p {
        margin: 0 0 24px;
        color: #cbd5e1;
        font-size: 17px;
      }

      a {
        color: #67e8f9;
      }

      code {
        display: block;
        overflow-wrap: anywhere;
        padding: 16px;
        border: 1px solid #334155;
        background: #101318;
        color: #fef08a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PixelSaurus Claw 777 Mint Machine</h1>
      <p>Public MML URL for Otherside/Yuga registration:</p>
      <code id="mml-url">pixelsaurus-claw-777-mint-machine.mml</code>
      <p>
        <a href="pixelsaurus-claw-777-mint-machine.mml">Open the MML file</a>
      </p>
    </main>
    <script>
      document.getElementById("mml-url").textContent =
        new URL("pixelsaurus-claw-777-mint-machine.mml", location.href).href;
    </script>
  </body>
</html>
